<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolify Hub – Smart Tools for Everyone</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <div class="brand">
    <h1>🌀 Toolify Hub</h1>
    <p>Smart Tools for Everyone</p>
  </div>
</header>

<main>
  <input id="tool-search" class="search-input" placeholder="Search tools…">

  <section class="tools">
    <div class="tool-card" onclick="showTool('currency')">💱<p>Currency</p></div>
    <div class="tool-card" onclick="showTool('unit')">📏<p>Unit</p></div>
    <div class="tool-card" onclick="showTool('password')">🔐<p>Password</p></div>
    <div class="tool-card" onclick="showTool('qr')">🔳<p>QR Code</p></div>
    <div class="tool-card" onclick="showTool('age')">🎂<p>Age</p></div>
    <div class="tool-card" onclick="showTool('image')">🖼<p>Image</p></div>
  </section>

  <!-- Currency Converter -->
  <section id="currency" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Currency Converter</h2>

    <input type="number" id="amount" placeholder="Enter amount">

    <div class="currency-select-row">
      <select id="fromCurrency"></select>
      <button id="favFromBtn" class="fav-btn">⭐</button>
    </div>

    <div class="currency-select-row">
      <select id="toCurrency"></select>
      <button id="favToBtn" class="fav-btn">⭐</button>
    </div>

    <button id="convertBtn">Convert</button>
    <p id="currencyResult" class="result-text"></p>
  </section>

  <!-- Unit Converter -->
  <section id="unit" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Unit Converter</h2>

    <input type="number" id="unit-value" placeholder="Enter value">

    <select id="unit-category">
      <option value="length">Length</option>
      <option value="weight">Weight</option>
      <option value="temperature">Temperature</option>
      <option value="speed">Speed</option>
    </select>

    <div class="currency-select-row">
      <select id="unit-from"></select>
      <p>to</p>
      <select id="unit-to"></select>
    </div>

    <button id="unit-convert-btn">Convert</button>
    <p id="unit-result" class="result-text"></p>
  </section>

  <!-- Password Generator -->
  <section id="password" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Password Generator</h2>

    <label for="password-length">Length:</label>
    <input type="number" id="password-length" value="12" min="6" max="30">

    <button onclick="generatePassword()">Generate Password</button>
    <p id="password-result" class="result-text"></p>
  </section>

  <!-- QR Code -->
  <section id="qr" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>QR Code Generator</h2>

    <input type="text" id="qr-input" placeholder="Enter text or URL">
    <button onclick="generateQR()">Generate QR Code</button>

    <div id="qr-result" class="qr-box"></div>
    <button id="qr-download" class="download-btn" style="display:none;">Download QR</button>
  </section>

  <!-- Age Calculator -->
  <section id="age" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Age Calculator</h2>

    <label for="birthdate">Enter Birth Date:</label>
    <input type="date" id="birthdate">

    <button onclick="calculateAge()">Calculate Age</button>
    <p id="age-result" class="result-text"></p>
  </section>

  <!-- Image Resizer -->
  <section id="image" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Image Resizer</h2>

    <input type="file" id="image-upload" accept="image/*">
    <label for="resize-width">Width (px):</label>
    <input type="number" id="resize-width" value="300">
    <label for="resize-height">Height (px):</label>
    <input type="number" id="resize-height" value="200">

    <button onclick="resizeAndDisplayImage()">Resize Image</button>
    <p id="image-result-text" class="result-text"></p>
    <div id="image-result-display"></div>
    <button id="img-download" class="download-btn" style="display:none;">Download Image</button>
  </section>

</main>

<footer class="footer">
  <p>© 2025 Toolify Hub — Smart Tools for Everyone</p>
</footer>

<script src="script.js"></script>
</body>
</html>
