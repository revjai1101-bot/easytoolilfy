<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolify Hub – Smart Tools for Everyone</title>

  <meta name="description" content="Toolify Hub provides free smart tools including currency converter, unit converter, age calculator, password generator, QR code generator, and image resizer. Fast, simple, accurate, and free.">

  <!-- Single AdSense Global Script (Important: only once) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6408441237069178"
  crossorigin="anonymous"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <div class="brand">
    <h1>🌀 Toolify Hub</h1>
    <p>Smart Tools for Everyone</p>
  </div>
</header>

<main>

  <!-- Home Page Ad -->
  <div class="ad-block">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6408441237069178"
         data-ad-slot="5142973431"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <input id="tool-search" class="search-input" placeholder="Search tools…">

  <section class="tools">
    <div class="tool-card" onclick="showTool('currency')">💱<p>Currency</p></div>
    <div class="tool-card" onclick="showTool('unit')">📏<p>Unit</p></div>
    <div class="tool-card" onclick="showTool('password')">🔐<p>Password</p></div>
    <div class="tool-card" onclick="showTool('qr')">🔳<p>QR Code</p></div>
    <div class="tool-card" onclick="showTool('age')">🎂<p>Age</p></div>
    <div class="tool-card" onclick="showTool('image')">🖼<p>Image</p></div>
  </section>

  <!-- Currency Converter -->
  <section id="currency" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Currency Converter</h2>

    <!-- Currency Ad -->
    <div class="ad-block">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6408441237069178"
           data-ad-slot="8828612160"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <input type="number" id="amount" placeholder="Enter amount">

    <div class="currency-select-row">
      <select id="fromCurrency"></select>
      <button id="favFromBtn" class="fav-btn">⭐</button>
    </div>

    <div class="currency-select-row">
      <select id="toCurrency"></select>
      <button id="favToBtn" class="fav-btn">⭐</button>
    </div>

    <button id="convertBtn">Convert</button>
    <p id="currencyResult" class="result-text"></p>
  </section>

  <!-- Unit Converter -->
  <section id="unit" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Unit Converter</h2>

    <!-- Unit Ad -->
    <div class="ad-block">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6408441237069178"
           data-ad-slot="1212285528"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <input type="number" id="unit-value" placeholder="Enter value">

    <select id="unit-category">
      <option value="length">Length</option>
      <option value="weight">Weight</option>
      <option value="temperature">Temperature</option>
      <option value="speed">Speed</option>
    </select>

    <div class="currency-select-row">
      <select id="unit-from"></select>
      <p>to</p>
      <select id="unit-to"></select>
    </div>

    <button id="unit-convert-btn">Convert</button>
    <p id="unit-result" class="result-text"></p>
  </section>

  <!-- Password Generator -->
  <section id="password" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Password Generator</h2>

    <!-- Password Ad -->
    <div class="ad-block">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6408441237069178"
           data-ad-slot="6224954969"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <label for="password-length">Length:</label>
    <input type="number" id="password-length" value="12" min="6">
    <button onclick="generatePassword()">Generate</button>
    <p id="password-result" class="result-text"></p>
  </section>

  <!-- QR Code -->
  <section id="qr" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>QR Code Generator</h2>

    <!-- QR Ad -->
    <div class="ad-block">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6408441237069178"
           data-ad-slot="8995406772"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <input type="text" id="qr-input" placeholder="Enter text or URL">
    <button onclick="generateQR()">Generate</button>
    <div id="qr-result"></div>
  </section>

  <!-- Age Calculator -->
  <section id="age" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Age Calculator</h2>

    <!-- Age Ad -->
    <div class="ad-block">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6408441237069178"
           data-ad-slot="7586122181"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <input type="date" id="birthdate">
    <button onclick="calculateAge()">Calculate</button>
    <p id="age-result" class="result-text"></p>
  </section>

  <!-- Image Resizer -->
  <section id="image" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Image Resizer</h2>

    <!-- Image Ad -->
    <div class="ad-block">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6408441237069178"
           data-ad-slot="6033383273"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <input type="file" id="image-upload" accept="image/*">
    <label>Width (px):</label>
    <input type="number" id="resize-width" value="300">
    <label>Height (px):</label>
    <input type="number" id="resize-height" value="200">
    <button onclick="resizeAndDisplayImage()">Resize</button>
    <p id="image-result-text" class="result-text"></p>
    <div id="image-result-display"></div>
  </section>

</main>

<footer class="footer">
  <p>© 2025 Toolify Hub — Smart Tools for Everyone</p>
</footer>

<script src="script.js"></script>
</body>
</html>
